name: CI/CD for Min-URL

on:
  push:
    branches: ['master', 'develop']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: ['master', 'develop']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Turbo cache config
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            turbo-${{ github.job }}-

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Build Lint Test
      - name: Build Lint Test
        run: bun x turbo run build lint typecheck format:check test --cache-dir=".turbo"
