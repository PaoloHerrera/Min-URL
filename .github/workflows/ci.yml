name: CI/CD for Min-URL

on:
  push:
    branches: ['master', 'develop']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: ['master', 'develop']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    env:
      PORT: 3001
      DB_NAME: Min-URL
      DB_USER: admin
      DB_PASS: admin
      DB_HOST: localhost
      DB_PORT: 5432
      API_KEY: ci_test_api_key_placeholder
      SECRET_HASH: ci_test_sec_hash
      LOCAL_IP: 127.0.0.1
      TURNSTILE_SITEKEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      CLOUDINARY_CLOUD_NAME: ci_test_cloudinary_cloud
      CLOUDINARY_API_KEY: ci_test_cloudinary_api_key
      CLOUDINARY_API_SECRET: ci_test_cloudinary_api_secret
      NODE_ENV: test
      REDIRECTOR_URL: http://localhost:3002
      SESSION_SECRET: ci_test_session_secret_at_least_32_characters
      REDIS_URL: localhost
      REDIS_PORT: 6379
    services:
      postgres:
        image: postgres:16.0
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: Min-URL
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Turbo cache config
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            turbo-${{ github.job }}-

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Initialize Database
      - name: Initialize Database
        run: PGPASSWORD=admin psql -h localhost -U admin -d Min-URL -f db/init.sql

      # Build Lint Test
      - name: Build Lint Test
        run: bun x turbo run build lint typecheck format:check test --cache-dir=".turbo"
